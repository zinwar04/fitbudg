name: Secret Guard

on:
  pull_request:
  push:

jobs:
  check-env-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scan tracked files for committed secrets
        run: node scripts/check-env-secrets.mjs
